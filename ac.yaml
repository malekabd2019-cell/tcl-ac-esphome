esphome:
  name: tcl-ac-controller
  friendly_name: "TCL Air Conditioner"

esp32:
  board: esp32dev
  framework:
    type: arduino

# القراءة من المجلد المحلي الذي سيتم تجهيزه تلقائياً
external_components:
  - source:
      type: local
      path: custom_components

# إعدادات الشبكة الخاصة بك
wifi:
  ssid: "TOTOLINK ND300"
  password: "A777763945A"

  ap:
    ssid: "Tcl-Ac-Fallback"
    password: "password123"

captive_portal:

api:
  password: ""

ota:
  - platform: esphome
    password: ""

logger:

# إعداد منفذ السيريال للمكيف
uart:
  - id: uart_ac
    tx_pin: GPIO17
    rx_pin: GPIO16
    baud_rate: 9600
    parity: EVEN
    stop_bits: 1

# واجهة التحكم بالمكيف
climate:
  - platform: tcl_ac
    name: "TCL AC"
    uart_id: uart_ac
    supports_cool: true
    supports_heat: true
    supports_fan_only: true
    supports_dry: true
    supports_auto: true
    
