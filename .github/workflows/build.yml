name: Build ESPHome Firmware

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESPHome
        run: pip install esphome

      - name: Download and Fix Component Layout
        run: |
          rm -rf custom_components
          mkdir -p custom_components/tcl_ac
          git clone https://github.com/lNikazzzl/tcl_ac_esphome.git temp_repo
          
          # نسخ الملفات بذكاء بحسب هيكلية المستودع
          if [ -d "temp_repo/components/tcl_ac" ]; then
            cp -r temp_repo/components/tcl_ac/* custom_components/tcl_ac/
          elif [ -d "temp_repo/custom_components/tcl_ac" ]; then
            cp -r temp_repo/custom_components/tcl_ac/* custom_components/tcl_ac/
          else
            cp -r temp_repo/* custom_components/tcl_ac/
          fi
          
          # إيقاف التضارب وتصحيح مسار climate إذا كان في مجلد فرعي
          if [ -f "custom_components/tcl_ac/climate/tcl_ac_climate.py" ] && [ ! -f "custom_components/tcl_ac/climate.py" ]; then
            cp custom_components/tcl_ac/climate/tcl_ac_climate.py custom_components/tcl_ac/climate.py
          fi

          rm -rf temp_repo

      - name: Build ESPHome Binary
        run: esphome compile ac.yaml

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: .esphome/build/tcl-ac-controller/.pioenvs/tcl-ac-controller/firmware.bin
          
