name: Build ESPHome Firmware

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESPHome
        run: pip install esphome

      - name: Download TCL AC Component
        run: |
          mkdir -p custom_components
          git clone https://github.com/lNikazzzl/tcl_ac_esphome.git custom_components/tcl_ac
          touch custom_components/tcl_ac/__init__.py

      - name: Build ESPHome Binary
        run: esphome compile ac.yaml

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: .esphome/build/tcl-ac-controller/.pioenvs/tcl-ac-controller/firmware.bin
          
